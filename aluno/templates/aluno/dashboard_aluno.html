<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Aluno</title>
</head>
<body>

<h1>Minhas Turmas</h1>

{% for turma in turmas %}

<div style="
    border:1px solid #ddd;
    padding:15px;
    margin-bottom:10px;
">

    <h3>{{ turma.nome }}</h3>

    <p>
        {{ turma.descricao }}
    </p>

</div>

{% empty %}

<p>
    Você ainda não está matriculado em nenhuma turma.
</p>

{% endfor %}

</body>
</html>
