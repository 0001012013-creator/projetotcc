<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Recuperação</title>
</head>
<body>

    <h1>Solicitar Recuperação de Senha</h1>

    <p>
        Informe seu e-mail para que o administrador
        receba a solicitação.
    </p>

    {% if sucesso %}
        <p>{{ sucesso }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Digite seu e-mail"
            required
        >

        <button type="submit">
            Enviar Solicitação
        </button>

    </form>

</body>
</html>
