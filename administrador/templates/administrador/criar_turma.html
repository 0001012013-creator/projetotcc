{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Criar Turma — EduHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/criar_turma.css' %}"/>
</head>
<body>
<div class="container">

  <!-- CABEÇALHO -->
  <div class="page-header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div>
        <h1>Criar Turma</h1>
        <p>Preencha os dados para cadastrar uma nova turma</p>
      </div>
    </div>
  </div>

  <form method="POST">
    {% csrf_token %}

    <div class="form-layout">

      <!-- COLUNA ESQUERDA -->
      <div class="col-main">

        <div class="card">
          <div class="card-section-title">Informações da turma</div>

          <div class="field">
            <label for="nome">Nome da turma <span class="req">*</span></label>
            <input type="text" id="nome" name="nome"
                   placeholder="Ex: Matemática 3A" required>
          </div>

          <div class="field">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao"
                      placeholder="Descreva o objetivo ou conteúdo da turma…"></textarea>
          </div>
        </div>

        <div class="card">
          <div class="card-section-title">Professor responsável</div>

          <div class="field">
            <label for="professor">Selecione o professor</label>
            <div class="select-wrap">
              <select id="professor" name="professor">
                <option value="">Nenhum professor selecionado</option>
                {% for professor in professores %}
                  <option value="{{ professor.id }}">{{ professor.first_name }}</option>
                {% endfor %}
              </select>
              <svg class="select-arrow" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>
        </div>

      </div>

      <!-- COLUNA DIREITA: alunos -->
      <div class="col-side">
        <div class="card card-alunos">
          <div class="card-section-title">
            Alunos da turma
            <span class="alunos-count" id="alunos-count">0 selecionado(s)</span>
          </div>

          <!-- Busca dentro da lista -->
          <div class="alunos-search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Buscar aluno…"
                   oninput="filtrarAlunos(this.value)" class="alunos-search">
          </div>

          <div class="alunos-box" id="alunos-box">
            {% for aluno in alunos %}
            <label class="aluno-item" for="aluno-{{ aluno.id }}">
              <input type="checkbox" id="aluno-{{ aluno.id }}"
                     name="alunos" value="{{ aluno.id }}"
                     onchange="atualizarCount()">
              <div class="aluno-avatar">{{ aluno.first_name|slice:":1"|upper }}</div>
              <span class="aluno-nome">{{ aluno.first_name }}</span>
              <svg class="aluno-check" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </label>
            {% empty %}
            <div class="alunos-empty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
              </svg>
              Nenhum aluno cadastrado ainda.
            </div>
            {% endfor %}
          </div>

        </div>
      </div>

    </div><!-- /form-layout -->

    <!-- AÇÕES -->
    <div class="form-actions">
      <a href="{% url 'gerenciar_turmas' %}" class="btn-ghost">Cancelar</a>
      <button type="submit" class="btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Criar Turma
      </button>
    </div>

  </form>
</div>

<script>
  function filtrarAlunos(termo) {
    const t = termo.toLowerCase();
    document.querySelectorAll('.aluno-item').forEach(item => {
      item.style.display = item.querySelector('.aluno-nome')
        .textContent.toLowerCase().includes(t) ? '' : 'none';
    });
  }

  function atualizarCount() {
    const n = document.querySelectorAll('.aluno-item input:checked').length;
    document.getElementById('alunos-count').textContent = `${n} selecionado(s)`;
  }
</script>

<div class="btn-center">
    <a href="{% url 'gerenciar_turmas' %}" class="btn-ghost">← Voltar</a>
</div>
</html>
