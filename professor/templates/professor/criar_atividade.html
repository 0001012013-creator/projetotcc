<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nova Atividade</title>
</head>
<body>

<h1>Nova Atividade</h1>

<p>
Turma: {{ turma.nome }}
</p>

<form method="POST">

    {% csrf_token %}

    <p>Título</p>

    <input
        type="text"
        name="titulo"
        required
    >

    <br><br>

    <p>Descrição</p>

    <textarea
        name="descricao"
        rows="6"
        required
    ></textarea>

    <br><br>

    <p>Data de Entrega</p>

    <input
        type="date"
        name="data_entrega"
    >

    <br><br>

    <button type="submit">
        Criar Atividade
    </button>

</form>

<br>

<a href="{% url 'detalhe_turma' turma.id %}">
    ← Voltar
</a>

</body>
</html>
