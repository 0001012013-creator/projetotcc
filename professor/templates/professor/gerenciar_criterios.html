<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Critérios</title>
</head>
<body>

<h1>
Critérios da Atividade
</h1>

<h2>
{{ atividade.titulo }}
</h2>

<hr>

<form method="POST">

    {% csrf_token %}

    <p>
        Palavra-chave
    </p>

    <input
        type="text"
        name="palavra_chave"
        required
    >

    <p>
        Peso
    </p>

    <input
        type="number"
        step="0.1"
        name="peso"
        required
    >

    <br><br>

    <button type="submit">
        Adicionar Critério
    </button>

</form>

<hr>

<h2>
Critérios Cadastrados
</h2>

{% for criterio in criterios %}

<div style="margin-bottom:10px;">

    <strong>
        {{ criterio.palavra_chave }}
    </strong>

    -

    {{ criterio.peso }} pontos

</div>

{% empty %}

<p>
Nenhum critério cadastrado.
</p>

{% endfor %}

</body>
</html>
